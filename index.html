<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot Store BG</title>
<style>
/* 💜 Градиент фон + анимация */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0f0c29, #512da8, #673ab7, #311b92);
  background-size: 400% 400%;
  animation: gradient 12s ease infinite;
  color: white;
  text-align: center;
}
@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* 🧠 Заглавие */
h1 {
  padding: 30px;
  font-size: 44px;
  text-shadow: 2px 2px 5px #000;
}

/* 📦 Грид за продуктите */
.products {
  display: grid;
  gap: 30px;
  padding: 20px;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

/* 📇 Продуктова карта */
.card {
  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 15px;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 8px 20px rgba(255,255,255,0.3);
}

/* 📸 Снимки */
.product-img {
  width: 100%;
  border-radius: 15px;
  transition: scale 0.3s;
}
.card:hover .product-img {
  transform: scale(1.08);
}

/* 🟣 Бутон */
.button {
  padding: 12px 25px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background: #8e24aa;
  color: white;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.button:hover {
  background: #d500f9;
  transform: scale(1.05);
}

/* 📩 Popup форма */
.popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #222;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
  width: 95%;
  max-width: 450px;
  text-align: left;
}
.popup h2 {text-align:center;}
.popup input, .popup button {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}
.popup .close {
  background: #b71c1c;
  width: 90%;
}
.checkbox-container {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  margin: 8px 0;
  color: #fff;
}
.checkbox-container input {width:auto;}
</style>
</head>
<body>

<h1>Brainrot Store BG</h1>

<div class="products">
  <div class="card">
    <img src="images/Garamadundung.webp" class="product-img" alt="Garamadundung">
    <h2>Garamadundung</h2>
    <p>Цена: 10 €</p>
    <button class="button" onclick="openForm('Garamadundung', 10)">Поръчай</button>
  </div>
  <div class="card">
    <img src="images/Cooki_and_milki.webp" class="product-img" alt="Cooki and Milki">
    <h2>Cooki and Milki</h2>
    <p>Цена: 20 €</p>
    <button class="button" onclick="openForm('Cooki and Milki', 20)">Поръчай</button>
  </div>
  <div class="card">
    <img src="images/Nah_uh.webp" class="product-img" alt="Nah uh">
    <h2>Nah uh</h2>
    <p>Цена: 150 €</p>
    <button class="button" onclick="openForm('Nah uh', 150)">Поръчай</button>
  </div>
</div>

<div id="orderForm" class="popup">
  <form id="orderFormElement" action="https://formspree.io/f/mreanjqb" method="POST" onsubmit="return showConfirmation(event)">
    <h2>Данни за доставка</h2>
    <input type="hidden" id="prod" name="Product">
    <input type="hidden" id="price" name="Price">
    <input type="text" name="FirstName" placeholder="Име" required>
    <input type="text" name="LastName" placeholder="Фамилия" required>
    <input type="email" name="Email" placeholder="Имейл" required>
    <input type="text" name="Phone" placeholder="Телефонен номер" required>
    <input type="text" name="DiscountCode" placeholder="Код за отстъпка (по избор)">
    <div class="checkbox-container">
      <input type="checkbox" name="Terms" required>
      <label>Съгласен съм с общите условия и политиката за поверителност на Brainrot Store BG</label>
    </div>
    <button type="submit" class="button">Премини към плащане</button>
    <button type="button" class="button close" onclick="closeForm()">Назад към продуктите</button>
  </form>
</div>

<script>
let currentPrice = 0;

function openForm(name, price) {
  document.getElementById('prod').value = name;
  document.getElementById('price').value = price;
  currentPrice = price;
  document.getElementById('orderForm').style.display = 'block';
}

function closeForm() {
  document.getElementById('orderForm').style.display = 'none';
}

function showConfirmation(event) {
  event.preventDefault();
  const form = document.getElementById('orderFormElement');
  const discountInput = form.DiscountCode.value.trim();
  let finalPrice = currentPrice;

  // Пример: код "DISCOUNT10" дава 10% отстъпка
  if(discountInput.toUpperCase() === "DISCOUNT10") {
    finalPrice = (currentPrice * 0.9).toFixed(2);
  }

  // Добавяме финалната цена като скрито поле
  form.querySelector('#price').value = finalPrice;

  // Изпращане на Formspree
  fetch(form.action, {
    method: form.method,
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    if(response.ok){
      closeForm();
      alert(`Поръчката ви е направена успешно! Продукт: ${form.Product.value}, цена: ${finalPrice} €. Ще се свържем с вас в рамките на 1 работен час.`);
      form.reset();
    } else {
      alert("Възникна грешка. Моля, опитайте отново.");
    }
  }).catch(error=>{
    alert("Възникна грешка. Моля, опитайте отново.");
  });

  return false;
}
</script>

</body>
</html>
