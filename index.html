<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot Store BG</title>
<!-- Favicon -->
<link rel="icon" href="images/logo.png" type="image/png">
<style>
/* 💜 Динамичен градиент фон + ефекти */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(-45deg, #0f0c29, #512da8, #673ab7, #311b92);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color: white;
}
@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* Header и кошница */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(0,0,0,0.6);
  position: sticky;
  top: 0;
  z-index: 10;
}
header h1 {
  margin: 0;
  font-size: 28px;
  text-shadow: 2px 2px 5px #000;
}
.cart {
  cursor: pointer;
  position: relative;
}
.cart-count {
  position: absolute;
  top: -8px;
  right: -8px;
  background: #d500f9;
  color: #fff;
  border-radius: 50%;
  padding: 2px 6px;
  font-size: 12px;
  font-weight: bold;
}

/* Grid за продуктите */
.products {
  display: grid;
  gap: 25px;
  padding: 20px;
  grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
}

/* Карта на продукта */
.card {
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 15px;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 8px 20px rgba(255,255,255,0.3);
}
.product-img {
  width: 100%;
  border-radius: 15px;
  transition: scale 0.3s;
}
.card:hover .product-img {
  transform: scale(1.08);
}

/* Badges */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: bold;
  color: #fff;
  text-transform: uppercase;
}
.secret {
  background: #b71c1c;
}
.rainbow {
  background: linear-gradient(90deg, red, orange, yellow, green, blue, purple);
  background-size: 300% 300%;
  animation: rainbow 4s linear infinite;
}
@keyframes rainbow {
  0% {background-position:0%;}
  50% {background-position:100%;}
  100% {background-position:0%;}
}

/* Бутон */
.button {
  padding: 12px 25px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background: #8e24aa;
  color: white;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.button:hover {
  background: #d500f9;
  transform: scale(1.05);
}

/* Popup форма */
.popup, .cart-popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: #222;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
  width: 90%;
  max-width: 450px;
  text-align: left;
  z-index: 20;
}
.popup h2, .cart-popup h2 {
  text-align: center;
}
.popup input, .popup button, .cart-popup button {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}
.popup .close, .cart-popup .close {
  background: #b71c1c;
}

/* Checkbox */
.checkbox-container {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  margin: 8px 0;
  color: #fff;
}
.checkbox-container input {width:auto;}
</style>
</head>
<body>

<header>
  <h1>Brainrot Store BG</h1>
  <div class="cart" onclick="toggleCart()">🛒 <span class="cart-count" id="cartCount">0</span></div>
</header>

<div class="products">
  <!-- Garama -->
  <div class="card">
    <div class="badge secret">Secret</div>
    <img src="images/Garamadundung.webp" class="product-img" alt="Garama and Madundung">
    <h2>Garama and Madundung</h2>
    <p>50M/s</p>
    <p>Цена: 10 €</p>
    <button class="button" onclick="openForm('Garama and Madundung', 10)">Избери пакет</button>
  </div>
  <!-- Cooki -->
  <div class="card">
    <div class="badge secret">Secret</div>
    <img src="images/Cooki_and_milki.webp" class="product-img" alt="Cooki and Milki">
    <h2>Cooki and Milki</h2>
    <p>465M/s</p>
    <p>Цена: 20 €</p>
    <button class="button" onclick="openForm('Cooki and Milki', 20)">Избери пакет</button>
  </div>
  <!-- Dragon -->
  <div class="card">
    <div class="badge secret">Secret</div>
    <div class="badge rainbow">Rainbow</div>
    <img src="images/Nah_uh.webp" class="product-img" alt="Dragon Cannelloni">
    <h2>Dragon Cannelloni (Rainbow)</h2>
    <p>2.5B/s</p>
    <p>Цена: 150 €</p>
    <button class="button" onclick="openForm('Dragon Cannelloni (Rainbow)', 150)">Избери пакет</button>
  </div>
</div>

<!-- Поръчка / popup -->
<div id="orderForm" class="popup">
  <form id="orderFormElement" action="https://formspree.io/f/mreanjqb" method="POST" onsubmit="return submitOrder(event)">
    <h2>Данни за поръчка</h2>
    <input type="hidden" id="prod" name="Product">
    <input type="hidden" id="price" name="Price">
    <input type="number" id="quantity" placeholder="Брой" min="1" value="1" required>
    <input type="text" name="FirstName" placeholder="Име" required>
    <input type="text" name="LastName" placeholder="Фамилия" required>
    <input type="email" name="Email" placeholder="Имейл" required>
    <input type="text" name="Phone" placeholder="Телефонен номер" required>
    <div class="checkbox-container">
      <input type="checkbox" name="Terms" required>
      <label>Съгласен съм с общите условия и политиката за поверителност на Brainrot Store BG</label>
    </div>
    <button type="submit" class="button">Добави в кошницата</button>
    <button type="button" class="button close" onclick="closeForm()">Назад към продуктите</button>
  </form>
</div>

<!-- Кошница -->
<div id="cartPopup" class="cart-popup">
  <h2>Вашата кошница</h2>
  <ul id="cartItems"></ul>
  <button class="button close" onclick="toggleCart()">Затвори</button>
</div>

<script>
let currentPrice = 0;
let cart = [];

function openForm(name, price) {
  document.getElementById('prod').value = name;
  document.getElementById('price').value = price;
  currentPrice = price;
  document.getElementById('quantity').value = 1;
  document.getElementById('orderForm').style.display = 'block';
}

function closeForm() { document.getElementById('orderForm').style.display = 'none'; }

function submitOrder(event) {
  event.preventDefault();
  const form = document.getElementById('orderFormElement');
  const name = form.Product.value;
  const price = Number(form.Price.value);
  const quantity = Number(document.getElementById('quantity').value);
  const finalPrice = calculatePrice(price, quantity);
  
  // Добавяне в кошницата
  cart.push({name:name, quantity:quantity, price:finalPrice});
  updateCart();
  
  closeForm();
  alert(`Продуктът "${name}" е добавен в кошницата. Ще се свържем с вас възможно най-скоро.`);
  form.reset();
}

function calculatePrice(price, quantity){
  let discount = 0;
  if(quantity==2) discount = 0.05;
  if(quantity>=5) discount = 0.10;
  return (price*quantity*(1-discount)).toFixed(2);
}

function updateCart(){
  const list = document.getElementById('cartItems');
  list.innerHTML='';
  cart.forEach(item=>{
    const li = document.createElement('li');
    li.textContent = `${item.quantity} x ${item.name} - ${item.price} €`;
    list.appendChild(li);
  });
  document.getElementById('cartCount').textContent = cart.length;
}

function toggleCart(){
  const popup = document.getElementById('cartPopup');
  popup.style.display = popup.style.display==='block'?'none':'block';
}
</script>

</body>
</html>
